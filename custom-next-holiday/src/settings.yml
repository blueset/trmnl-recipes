no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: get
framework_version: 3.1.1
serverless_language: ''
polling_url: ''
polling_headers: ''
polling_body: ''
id: 257171
oauth_enabled: 'false'
oauth_pkce_enabled: 'no'
oauth_authorize_url: ''
oauth_token_url: ''
oauth_scopes: ''
oauth_scope_separator: ''
oauth_refresh_url: ''
oauth_auth_params: ''
oauth_token_headers: ''
oauth_token_site: ''
oauth_token_params: ''
oauth_token_request_auth_method: ''
oauth_body_format: ''
oauth_token_response_metadata: ''
oauth_authorization_method: ''
oauth_refresh_params: ''
oauth_token_field_name: ''
oauth_expiry_field_name: ''
oauth_expiry_strategy: ''
oauth_fixed_expiry_ms: ''
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: Countdown to your custom holidays. Support absolute dates, date of month, and <b class="font-normal italic">n</b>-th weekday of month.
  github_url: https://github.com/blueset/trmnl-recipes
  category: calendar,personal
- keyname: holidays
  field_type: code
  name: Holidays
  description: |
    Define your custom holidays here. You can use absolute dates, date of month, or <b class="font-normal italic">n</b>-th weekday of month formats.<br>
    Use the <a href="https://blueset.github.io/trmnl-recipes/holiday-editor/index.html" target="_blank" class="underline">Holiday Editor</a> to easily add, edit, and manage your holidays, or learn more about the <a href="https://blueset.github.io/trmnl-recipes/holiday-editor/index.html#reference" target="_blank" class="underline">supported date formats</a>.
  placeholder: |
    - name: Christmas Day (Date of month)
      date: 12-25  # Format: MM-DD
      icon: fluent-ioji-flat:fireworks  # Icon for the holiday, find yours at https://icon-sets.iconify.design/
      round: [1, 2, 3, 4, 5]  # Optional: Round to nearest weekday (1=Monday, 7=Sunday)
    - name: Year 2038 problem (Absolute date)
      date: 2038-01-19  # Format: YYYY-MM-DD
      icon: mdi:cpu-32-bit
    - name: US Memorial Day (last n-th weekday of month)
      date: 05Wn1-1  # Format: MWnw-D (e.g., 05Wn1-1 for last Monday of May)
      icon: fluent-ioji-flat:reindeer-ribbon
    - name: Chinese New Year (Date of month with different calendar)
      date: 01-01[u-ca=chinese]  # Format: MM-DD[u-ca=calendar] (e.g., 01-01[u-ca=chinese] for Chinese New Year)
      icon: fluent-ioji-flat:red-envelope
  default: |-
    - name: Christmas Day (Date of month)
      date: 12-25  # Format: MM-DD
      icon: fluent-ioji-flat:fireworks  # Icon for the holiday, find yours at https://icon-sets.iconify.design/
      round: [1, 2, 3, 4, 5]  # Optional: Round to nearest weekday (1=Monday, 7=Sunday)
    - name: Year 2038 problem (Absolute date)
      date: 2038-01-19  # Format: YYYY-MM-DD
      icon: mdi:cpu-32-bit
    - name: US Memorial Day (last n-th weekday of month)
      date: 05Wn1-1  # Format: MWnw-D (e.g., 05Wn1-1 for last Monday of May)
      icon: fluent-ioji-flat:reindeer-ribbon
    - name: Chinese New Year (Date of month with different calendar)
      date: 01-01[u-ca=chinese]  # Format: MM-DD[u-ca=calendar] (e.g., 01-01[u-ca=chinese] for Chinese New Year)
      icon: fluent-ioji-flat:red-envelope
name: Custom Next Holiday and Countdown
refresh_interval: 1440
