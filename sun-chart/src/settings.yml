---
strategy: static
no_screen_padding: 'no'
dark_mode: 'no'
static_data: "{}"
polling_verb: get
framework_version: 3.1.1
serverless_language: ''
polling_url: https://suntracker.me/?lat={{ Latitude }}&lon={{ Longitude }}
polling_headers: ''
polling_body: ''
id: 195274
oauth_enabled: 'false'
oauth_pkce_enabled: 'no'
oauth_authorize_url: ''
oauth_token_url: ''
oauth_scopes: ''
oauth_scope_separator: ''
oauth_refresh_url: ''
oauth_auth_params: ''
oauth_token_headers: ''
oauth_token_site: ''
oauth_token_params: ''
oauth_token_request_auth_method: ''
oauth_body_format: ''
oauth_token_response_metadata: ''
oauth_authorization_method: ''
oauth_refresh_params: ''
oauth_token_field_name: ''
oauth_expiry_field_name: ''
oauth_expiry_strategy: ''
oauth_fixed_expiry_ms: ''
custom_fields:
- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  description: Sunrise and sunset time with a daily and yearly chart.
  category: calendar,life
  github_url: https://github.com/blueset/trmnl-recipes
- keyname: coordinate
  field_type: lat_lon
  name: Location
  description: Search for a city or postal code, or provide a comma-separated lat/long.
- keyname: Latitude
  field_type: string
  name: Latitude (Deprecated)
  description: (Deprecated, use “Location” above.) Location in Latitude, find yours <a href="https://www.latlong.net/" class="underline" target="_blank">here</a>.
  optional: true
  group: Deprecated
- keyname: Longitude
  field_type: string
  name: Longitude (Deprecated)
  description: (Deprecated, use “Location” above.) Location in Longitude, find yours <a href="https://www.latlong.net/" class="underline" target="_blank">here</a>.
  optional: true
  group: Deprecated
- keyname: hour_cycle
  field_type: select
  name: Time format
  options:
  - 24-hour: h23
  - 12-hour: h12
  default: h23
- keyname: time_zone
  field_type: time_zone
  name: Time Zone
  description: By default, we will guess the time zone to use based on the location. You can also specify one below.
  default: ''
  optional: true
name: Sunrise and Sunset Chart
refresh_interval: 15
