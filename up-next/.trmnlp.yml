        review where you talk through the design and get final feedback on the design
        in case there are any final holes you have not answered in the design or in case
        anyone has any feedback that will impact your design.Likely attendees:our team,
        key partners, interested engineers from within OneDrive &amp; SharePointFormat:doc
        (this facilitates offline preparatory reading and commenting in the doc)Your Expected
        Prep:send the doc broadly in the OneDrive &amp; SharePoint teamOutcome:signoff
        from team that you?re good to go on implementationYour Expected Follow-up:close
        down all issues brought up in the review.  Follow-up with specific people who
        had specific key design feedback for their explicit okay. Broad OneDrive &amp;
        SharePoint-wide Design Review:This would be a presentation of your design to everyone
        in the org.  The previous meeting type could take this form as well.  I expect
        we?ll want to do these only for key features that have broad appeal.  Examples
        would be: Cold Storage, Vault (when we?re at a final design), Xschema v2 rewrite.Likely
        attendees:anyone from OneDrive &amp; SharePointFormat:docYour Expected Prep:send
        the doc broadly in the OneDrive &amp; SharePoint teamOutcome:none expected ? we
        expect all material feedback to have come in earlier design discussions.   '
