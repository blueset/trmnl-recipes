      calname: c_c3452919b8e1ec447e7b9967b30d66761b542997391509321a1c278c77c87422@group.calendar.google.com
      summary: CAP Town Hall
      end_full: '2026-06-19T10:15:00.000-07:00'
      location: Streaming live - aka.ms/CAPTownHall
      date_time: '2026-06-19T09:30:00.000-07:00'
      start_full: '2026-06-19T09:30:00.000-07:00'
      description: " JUNE 2026  Join us for the Copilot, Agents and Platform (CAP) Town
        Hall on June 19Tune in live at aka.ms/CAPTownHall on Friday, June 19 at 9:30 AM
        PT for the opportunity to hear from Charles Lamanna (EVP, CAP) on what's top of
        mind – and to address topics of interest to you.To join the live event:Copy and
        paste aka.ms/CAPTownHallinto your browser. Please submit &amp; vote for questions
        in advance:Share your questions at aka.ms/CAPTownHall related to areas of Business
        Strategy, Customers &amp; Product, or People &amp; Culture. See what others have
        posted and upvote any of interest to you – your votes will help us prioritize
        the topics we’ll cover. You will also be able to ask questions via the Viva Engage
        Live event on the day of the Town Hall. Don’t forget to review ourTown Hall guidelinesbefore
        the event!  Submit your questions Problems watching the live event? Please type
        aka.ms/CAPTownHall into your browser.Still not working? You can watch a backup
        stream by pasting this URL into your browser: aka.ms/CAPEvent_BackupThe session
        will also be recorded for those who cannot join at this time.Due to logistical
        constraints, in-person attendance in this hybrid Town Hall is by invitation only.
        Please see the FAQ below to learn more.  CAP Event FAQ  Q1: How do I submit a
        question?  A1: Submit your question(s) or upvote the ones you like in Viva Engage
        at aka.ms/CAPTownHall. We’re asking for questions related to the areas of Business
        Strategy, Customers &amp; Product, or People &amp; Culture.  Q2: Why can’t I submit
        my question anonymously?  A2: This Q&amp;A will be a hybrid format of in-person
        and online questions. To help create a consistent experience for all attendees,
        we will not be utilizing the anonymous feature for virtual submissions.  Q3: Could
        my question get rejected?   A3: Yes. Each question is reviewed to check for potentially
        inappropriate language and to ensure the question is properly formatted to be
        asked and understood. If your question contains inappropriate language, is threatening,
        or is a statement instead of a question, it will not be approved. We encourage
        you to revise and resubmit if your question is rejected.  Q4: Why is in-person
        attendance by invite-only?   A4: We are excited to offer a hybrid format, but
        due to logistical constraints we are only able to accommodate a small group of
        in-person participants. For this event, all attendees were directly nominated
        by their respective LT. We hope to continue to grow our hybrid programming for
        future events!Visit theCAP Event Guidelinesfor more information.     Questions
        or comments? Reach out toCAP RoB      "
